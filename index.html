<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Be Back Later</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    h1 {
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-align: center;
    }

    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .icon {
      font-size: 1rem;
      cursor: pointer;
      opacity: 0.6;
      position: relative;
      transition: opacity 0.2s ease;
    }

    .icon:hover {
      opacity: 1;
    }

    .tooltip {
      position: absolute;
      bottom: 150%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      background: #111;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .icon.active .tooltip {
      opacity: 1;
    }

    @media (hover: hover) {
      .icon:hover .tooltip {
        opacity: 1;
      }
    }

    .icon.active {
      z-index: 10;
      opacity: 1;
    }

    .icon.faded .tooltip {
      opacity: 0.25 !important;
    }
  </style>
</head>

<body>

  <h1>gone swimming, be back later</h1>

  <footer>
    <div class="icon" onclick="setActive(this)">
      📍
      <div class="tooltip">currently in Dublin, Ireland</div>
    </div>

    <div class="icon" id="emailIcon" onclick="setActive(this)">
      ✉️
      <div class="tooltip" id="emailTooltip"></div>
    </div>
  </footer>

  <script>
    let activeIcon = null;
    const icons = document.querySelectorAll(".icon");

    function setActive(el) {
      icons.forEach(i => i.classList.remove("faded"));

      if (activeIcon && activeIcon !== el) {
        activeIcon.classList.remove("active");
      }

      if (el.classList.contains("active")) {
        el.classList.remove("active");
        activeIcon = null;
      } else {
        el.classList.add("active");
        activeIcon = el;
      }
    }

    icons.forEach(icon => {
      icon.addEventListener("mouseenter", () => {
        if (!activeIcon) return;

        icons.forEach(i => i.classList.remove("faded"));

        if (activeIcon !== icon) {
          activeIcon.classList.add("faded");
        }
      });

      icon.addEventListener("mouseleave", () => {
        icons.forEach(i => i.classList.remove("faded"));
      });
    });

    // ===== EMAIL OBFUSCATION =====
    const user = "ryukakong";
    const domain = "gmail.com";
    const email = user + "@" + domain;

    document.getElementById("emailTooltip").textContent = email;
  </script>

</body>
</html>
