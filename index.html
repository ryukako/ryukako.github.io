<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Be Back Later</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    h1 {
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-align: center;
    }

    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .icon {
      font-size: 1rem;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s ease;
      position: relative;
    }

    .icon:hover {
      opacity: 1;
    }

    .tooltip {
      position: absolute;
      bottom: 150%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      background: #111;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    /* Hover shows tooltip */
    .icon:hover .tooltip {
      opacity: 1;
    }

    /* Click locks tooltip open */
    .icon.active .tooltip {
      opacity: 1;
    }
  </style>
</head>
<body>

  <h1>gone swimming, be back later</h1>

  <footer>
    <div class="icon" id="locationIcon" onclick="toggleLock(this)">
      📍
      <div class="tooltip">currently in Dublin, Ireland</div>
    </div>

    <div class="icon" id="emailIcon" onclick="copyAndToggle(this)">
      ✉️
      <div class="tooltip" id="emailTooltip"></div>
    </div>
  </footer>

  <script>
    const user = "ryukakong";
    const domain = "gmail.com";
    const email = user + "@" + domain;

    document.getElementById("emailTooltip").textContent = email;

    let activeIcon = null;

    function toggleLock(el) {
      if (activeIcon && activeIcon !== el) {
        activeIcon.classList.remove("active");
      }

      if (el.classList.contains("active")) {
        el.classList.remove("active");
        activeIcon = null;
      } else {
        el.classList.add("active");
        activeIcon = el;
      }
    }

    function copyAndToggle(el) {
      navigator.clipboard.writeText(email);

      if (activeIcon && activeIcon !== el) {
        activeIcon.classList.remove("active");
      }

      if (el.classList.contains("active")) {
        el.classList.remove("active");
        activeIcon = null;
      } else {
        el.classList.add("active");
        activeIcon = el;
      }
    }
  </script>

</body>
</html>
